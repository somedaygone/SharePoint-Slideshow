<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Slideshow</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<style>
  /* ── RESET & BASE ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold:    #c9a96e;
    --gold-dim:#7a5f35;
    --bg:      #0a0a0a;
    --surface: #141414;
    --border:  #2a2a2a;
    --text:    #e8e0d4;
    --muted:   #6b6358;
    --danger:  #c0392b;
    --radius:  12px;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body:    'DM Sans', sans-serif;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  /* ── SCREENS ──────────────────────────────────────────────── */
  .screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .4s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── LOGIN SCREEN ─────────────────────────────────────────── */
  #screen-login {
    background: radial-gradient(ellipse at 30% 40%, #1a1408 0%, var(--bg) 65%);
    flex-direction: column;
    gap: 0;
  }
  .login-card {
    width: min(440px, 92vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px 40px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    box-shadow: 0 32px 80px rgba(0,0,0,.7);
  }
  .login-header { text-align: center; }
  .login-logo {
    width: 52px; height: 52px;
    margin: 0 auto 18px;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .login-title {
    font-family: var(--font-display);
    font-size: 28px; font-weight: 300;
    letter-spacing: .04em;
    color: var(--text);
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 13px; color: var(--muted);
    letter-spacing: .02em;
  }

  /* interval control */
  .field-label {
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px;
  }
  .interval-row {
    display: flex; align-items: center; gap: 10px;
  }
  .interval-btn {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--border); border: none; color: var(--text);
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .interval-btn:hover { background: var(--gold-dim); }
  .interval-val {
    flex: 1; text-align: center;
    font-family: var(--font-display); font-size: 22px; font-weight: 300;
    color: var(--gold);
  }

  /* buttons */
  .btn-primary {
    width: 100%; padding: 15px;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    border: none; border-radius: var(--radius);
    color: #0a0a0a; font-family: var(--font-body); font-size: 15px; font-weight: 400;
    letter-spacing: .06em; text-transform: uppercase;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
  }
  .btn-primary:active { transform: scale(.98); opacity: .9; }
  .btn-secondary {
    background: transparent; border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius);
    padding: 12px 20px; cursor: pointer; font-family: var(--font-body);
    font-size: 14px; transition: border-color .2s;
  }
  .btn-secondary:hover { border-color: var(--gold-dim); }

  /* ── CATEGORY SCREEN ──────────────────────────────────────── */
  #screen-category {
    flex-direction: column; gap: 24px;
    background: radial-gradient(ellipse at 60% 30%, #1a1408 0%, var(--bg) 70%);
    padding: 24px;
  }
  .cat-title {
    font-family: var(--font-display); font-size: 26px; font-weight: 300;
    letter-spacing: .05em; text-align: center; color: var(--text);
  }
  .cat-grid {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center; max-width: 480px;
  }
  .cat-chip {
    padding: 10px 22px; border-radius: 100px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 14px; cursor: pointer;
    transition: all .2s;
  }
  .cat-chip:hover, .cat-chip.active {
    border-color: var(--gold); background: rgba(201,169,110,.12); color: var(--gold);
  }
  .cat-chip.all-chip {
    border-color: var(--gold-dim); color: var(--gold);
  }
  .status-msg {
    font-size: 13px; color: var(--muted); text-align: center; min-height: 18px;
  }
  .status-msg.error { color: #e07070; }

  /* ── SLIDESHOW SCREEN ─────────────────────────────────────── */
  #screen-slide {
    background: #000;
    flex-direction: column;
    cursor: pointer;
  }

  /* background blur layer */
  #slide-bg {
    position: absolute; inset: -20px;
    background-size: cover; background-position: center;
    filter: blur(22px) brightness(.35) saturate(1.3);
    transition: background-image .8s ease;
    z-index: 0;
  }

  /* main image */
  #slide-img {
    position: relative; z-index: 1;
    max-width: 100%; max-height: 100vh;
    object-fit: contain;
    opacity: 0;
    transition: opacity .7s ease;
    display: block;
    margin: auto;
  }
  #slide-img.visible { opacity: 1; }

  /* progress bar */
  #progress-bar-wrap {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 3px; background: rgba(255,255,255,.08); z-index: 10;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dim), var(--gold));
    width: 0%; transition: width linear;
  }

  /* HUD overlay — tap to show/hide */
  #hud {
    position: absolute; inset: 0; z-index: 20;
    display: flex; flex-direction: column;
    justify-content: space-between; pointer-events: none;
    opacity: 0; transition: opacity .3s;
  }
  #hud.visible { opacity: 1; pointer-events: auto; }

  .hud-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 18px 20px;
    background: linear-gradient(to bottom, rgba(0,0,0,.7) 0%, transparent 100%);
  }
  .hud-title {
    font-family: var(--font-display); font-size: 20px; font-weight: 300;
    color: #fff; letter-spacing: .04em;
    text-shadow: 0 1px 8px rgba(0,0,0,.8);
    max-width: 70%; word-break: break-word;
  }
  .hud-counter {
    font-size: 12px; color: rgba(255,255,255,.5); letter-spacing: .1em;
    text-align: right;
    text-shadow: 0 1px 4px rgba(0,0,0,.8);
  }
  .hud-bottom {
    padding: 16px 20px 24px;
    background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 100%);
    display: flex; justify-content: space-between; align-items: center;
  }
  .hud-cat-badge {
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--gold); padding: 5px 12px;
    border: 1px solid rgba(201,169,110,.4); border-radius: 100px;
    background: rgba(201,169,110,.08);
  }
  .hud-controls { display: flex; gap: 10px; align-items: center; }
  .hud-btn {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,.12); border: none; color: #fff;
    font-size: 18px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    transition: background .15s;
  }
  .hud-btn:hover { background: rgba(255,255,255,.22); }
  .hud-btn.pause-btn { font-size: 14px; }

  /* ── SETTINGS PANEL ───────────────────────────────────────── */
  #settings-panel {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,.75); backdrop-filter: blur(6px);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  #settings-panel.open { opacity: 1; pointer-events: auto; }
  .settings-sheet {
    width: min(500px, 100%); background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    padding: 28px 28px 36px;
    display: flex; flex-direction: column; gap: 22px;
    transform: translateY(20px); transition: transform .3s ease;
  }
  #settings-panel.open .settings-sheet { transform: translateY(0); }
  .settings-title {
    font-family: var(--font-display); font-size: 22px; font-weight: 300;
    letter-spacing: .04em;
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .settings-label { font-size: 14px; color: var(--muted); }
  .settings-actions { display: flex; gap: 10px; }

  /* ── LOADING OVERLAY ──────────────────────────────────────── */
  #loading {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    opacity: 0; pointer-events: none; transition: opacity .3s;
  }
  #loading.show { opacity: 1; pointer-events: auto; }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-msg { font-size: 13px; color: var(--muted); }

  /* ── PRESET CHIPS ─────────────────────────────────────────── */
  .preset-chips {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .preset-chip {
    flex: 1;
    padding: 8px 4px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    text-align: center;
    user-select: none;
    -webkit-user-select: none;
    transition: border-color .15s, background .15s, color .15s;
  }
  .preset-chip.active {
    border-color: var(--gold);
    background: rgba(201,169,110,.12);
    color: var(--gold);
  }
  @keyframes chip-hold {
    0%   { transform: scale(1);   border-color: var(--border); }
    100% { transform: scale(.96); border-color: var(--gold); }
  }
  .preset-chip.pressing { animation: chip-hold .5s ease-out forwards; }

  /* ── CHIP EDIT POPOVER ─────────────────────────────────────── */
  #chip-edit-popover {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 300;
    box-shadow: 0 8px 32px rgba(0,0,0,.6);
    min-width: 220px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .15s, transform .15s;
    transform: scale(.95);
    transform-origin: bottom left;
  }
  #chip-edit-popover.open { opacity: 1; pointer-events: auto; transform: scale(1); }
  .popover-row { display: flex; gap: 8px; }
  .popover-input {
    flex: 1; min-width: 0;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font-body); font-size: 15px;
    padding: 8px 10px; text-align: center;
  }
  .popover-input:focus { outline: none; border-color: var(--gold-dim); }
  .popover-unit {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font-body); font-size: 13px;
    padding: 8px; cursor: pointer;
  }
  .popover-unit:focus { outline: none; border-color: var(--gold-dim); }
  .popover-actions { display: flex; gap: 8px; }
  .popover-save {
    flex: 1; padding: 9px;
    background: linear-gradient(135deg, var(--gold-dim), var(--gold));
    border: none; border-radius: 8px;
    color: #0a0a0a; font-family: var(--font-body); font-size: 14px; cursor: pointer;
  }
  .popover-cancel {
    flex: 1; padding: 9px;
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: var(--font-body); font-size: 14px; cursor: pointer;
  }
  .popover-cancel:hover { border-color: var(--gold-dim); }

  /* ── TOAST ────────────────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(60px);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 10px 22px;
    font-size: 13px; color: var(--text);
    transition: transform .3s ease, opacity .3s;
    z-index: 200; opacity: 0; white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  #toast.error { border-color: var(--danger); color: #e07070; }

  /* ── ORDER TOGGLE ─────────────────────────────────────────── */
  .order-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 3px;
    gap: 2px;
  }
  .order-btn {
    padding: 6px 16px;
    border-radius: 100px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .order-btn.active {
    border-color: var(--gold);
    background: rgba(201,169,110,.12);
    color: var(--gold);
  }
</style>
</head>

<script>
"use strict";

/* ── MSAL SETUP ─────────────────────────────────────────────── */
const msalConfig = {
  auth: {
    clientId: CONFIG.clientId,
    authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
    redirectUri: CONFIG.redirectUri,
  },
  cache: { cacheLocation: "sessionStorage", storeAuthStateInCookie: false }
};
const msalInstance = new msal.PublicClientApplication(msalConfig);
const SCOPES = ["https://graph.microsoft.com/Sites.Read.All"];

/* ── STATE ──────────────────────────────────────────────────── */
const ORDER_KEY = 'slideshow_order';

const state = {
  intervalSec:    CONFIG.defaultIntervalSec,
  slides:         [],  // { imageUrl, title, category, date, slideNum }
  currentIndex:   0,
  paused:         false,
  hudVisible:     false,
  selectedCat:    "__ALL__",
  orderMode:      localStorage.getItem(ORDER_KEY) || 'sorted',
  siteId:         null,
  listId:         null,
  timer:          null,
  progressTimer:  null,
};

/* ── UTILITIES ──────────────────────────────────────────────── */
const $  = id => document.getElementById(id);
const show  = id => $('screen-'+id).classList.remove('hidden');
const hide  = id => $('screen-'+id).classList.add('hidden');

function showLoading(msg="Loading…") {
  $('loading-msg').textContent = msg;
  $('loading').classList.add('show');
}
function hideLoading() { $('loading').classList.remove('show'); }

let toastTimer;
function toast(msg, isError=false) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.toggle('error', isError);
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

function fmtInterval(s) {
  if (s < 60) return `${s} sec`;
  if (s < 3600) { const m = s/60; return Number.isInteger(m) ? `${m} min` : `${m.toFixed(1)} min`; }
  const h = s/3600; return Number.isInteger(h) ? `${h} hr` : `${h.toFixed(1)} hr`;
}

/* ── SLIDE ORDER ─────────────────────────────────────────── */
function shuffleSlides(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function sortSlides(arr) {
  arr.sort((a, b) => {
    if (a.date < b.date) return 1;
    if (a.date > b.date) return -1;
    return (a.slideNum || 0) - (b.slideNum || 0);
  });
}

function updateOrderToggleUI() {
  document.querySelectorAll('.order-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.order === state.orderMode);
  });
}

function setOrderMode(mode) {
  state.orderMode = mode;
  localStorage.setItem(ORDER_KEY, mode);
  updateOrderToggleUI();
  if (!state.slides.length) return;
  if (mode === 'random') {
    shuffleSlides(state.slides);
  } else {
    sortSlides(state.slides);
  }
  state.currentIndex = 0;
  renderSlide(0);
  scheduleNext();
}

/* ── PRESETS ─────────────────────────────────────────────── */
const DEFAULT_PRESETS = [5, 10, 60, 300, 3600];
const PRESETS_KEY = 'slideshow_presets';

function loadPresets() {
  try {
    const raw = localStorage.getItem(PRESETS_KEY);
    if (raw) {
      const arr = JSON.parse(raw);
      if (Array.isArray(arr) && arr.length === 5 && arr.every(n => Number.isInteger(n) && n >= 1))
        return arr;
    }
  } catch {}
  return [...DEFAULT_PRESETS];
}

let presets = loadPresets();
const _intervalControls = [];

function syncAllIntervalControls() {
  _intervalControls.forEach(c => { c.updateDisplay(); c.syncChips(); });
}

function applyPreset(index) {
  state.intervalSec = presets[index];
  syncAllIntervalControls();
  if (state.slides.length) scheduleNext();
}

/* ── CHIP LONG-PRESS ─────────────────────────────────────── */
let _editIndex = null;

function openChipEditor(chip, index) {
  _editIndex = index;
  const sec = presets[index];
  let val, unit;
  if (sec >= 3600 && sec % 3600 === 0) { val = sec / 3600; unit = '3600'; }
  else if (sec >= 60 && sec % 60 === 0) { val = sec / 60;   unit = '60';   }
  else                                  { val = sec;         unit = '1';    }

  $('popover-val').value  = val;
  $('popover-unit').value = unit;

  const popover = $('chip-edit-popover');
  const rect    = chip.getBoundingClientRect();
  const popW    = popover.offsetWidth  || 220;
  const popH    = popover.offsetHeight || 110;

  let left = rect.left;
  let top  = rect.top - popH - 8;
  if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  if (left < 8) left = 8;
  if (top  < 8) top  = rect.bottom + 8;

  popover.style.left = left + 'px';
  popover.style.top  = top  + 'px';
  popover.classList.add('open');
}

function closeChipEditor() {
  $('chip-edit-popover').classList.remove('open');
  _editIndex = null;
}

function setupChipInteraction(chip, index) {
  let pressTimer = null, startX = 0, startY = 0;

  chip.addEventListener('pointerdown', e => {
    startX = e.clientX; startY = e.clientY;
    chip.classList.add('pressing');
    pressTimer = setTimeout(() => {
      pressTimer = null;
      chip.classList.remove('pressing');
      openChipEditor(chip, index);
    }, 500);
  });

  chip.addEventListener('pointermove', e => {
    if (!pressTimer) return;
    if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) {
      clearTimeout(pressTimer); pressTimer = null;
      chip.classList.remove('pressing');
    }
  });

  chip.addEventListener('pointerup', () => {
    if (pressTimer) {
      clearTimeout(pressTimer); pressTimer = null;
      chip.classList.remove('pressing');
      applyPreset(index);
    }
  });

  chip.addEventListener('pointercancel', () => {
    clearTimeout(pressTimer); pressTimer = null;
    chip.classList.remove('pressing');
  });
}

/* ── INTERVAL CONTROL RENDERER ───────────────────────────── */
function renderIntervalControl(containerEl) {
  const chipsRow = document.createElement('div');
  chipsRow.className = 'preset-chips';

  const chipEls = presets.map((_, i) => {
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'preset-chip';
    setupChipInteraction(chip, i);
    chipsRow.appendChild(chip);
    return chip;
  });

  const tuneRow = document.createElement('div');
  tuneRow.className = 'interval-row';

  const btnDown = document.createElement('button');
  btnDown.type = 'button'; btnDown.className = 'interval-btn'; btnDown.textContent = '−';

  const display = document.createElement('div');
  display.className = 'interval-val';

  const btnUp = document.createElement('button');
  btnUp.type = 'button'; btnUp.className = 'interval-btn'; btnUp.textContent = '+';

  tuneRow.append(btnDown, display, btnUp);
  containerEl.append(chipsRow, tuneRow);

  function syncChips() {
    chipEls.forEach((chip, i) => {
      chip.textContent = fmtInterval(presets[i]);
      chip.classList.toggle('active', presets[i] === state.intervalSec);
    });
  }
  function updateDisplay() { display.textContent = fmtInterval(state.intervalSec); }

  btnDown.addEventListener('click', () => {
    state.intervalSec = Math.max(CONFIG.minIntervalSec, state.intervalSec - CONFIG.intervalStepSec);
    syncAllIntervalControls();
    if (state.slides.length) scheduleNext();
  });
  btnUp.addEventListener('click', () => {
    state.intervalSec = Math.min(CONFIG.maxIntervalSec, state.intervalSec + CONFIG.intervalStepSec);
    syncAllIntervalControls();
    if (state.slides.length) scheduleNext();
  });

  const ctrl = { syncChips, updateDisplay };
  _intervalControls.push(ctrl);
  syncChips();
  updateDisplay();
  return ctrl;
}

/* ── AUTH ───────────────────────────────────────────────────── */
async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error("Not signed in");
  try {
    const res = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
    return res.accessToken;
  } catch {
    await msalInstance.acquireTokenRedirect({ scopes: SCOPES });
  }
}

/* ── GRAPH API HELPERS ──────────────────────────────────────── */
async function graphGet(url) {
  const token = await getToken();
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err?.error?.message || `HTTP ${res.status}`);
  }
  return res.json();
}

async function getSiteId() {
  if (state.siteId) return state.siteId;
  const u = new URL(CONFIG.siteUrl);
  const hostname = u.hostname;
  const path = u.pathname.replace(/^\//, '');
  const data = await graphGet(`https://graph.microsoft.com/v1.0/sites/${hostname}:/${path}`);
  state.siteId = data.id;
  return state.siteId;
}

async function getListId() {
  if (state.listId) return state.listId;
  const siteId = await getSiteId();
  // Graph API doesn't support $filter on /lists, so fetch all and match client-side
  const data = await graphGet(
    `https://graph.microsoft.com/v1.0/sites/${siteId}/lists`
  );
  const list = data.value?.find(
    l => l.name === CONFIG.listName || l.displayName === CONFIG.listName
  );
  if (!list) throw new Error(`List "${CONFIG.listName}" not found`);
  state.listId = list.id;
  return state.listId;
}

async function fetchItems(category, applySort = true) {
  const siteId = await getSiteId();
  const listId = await getListId();

  let url = `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items?$expand=fields&$top=999`;

  if (category && category !== "__ALL__") {
    url += `&$filter=fields/${CONFIG.categoryColumn} eq '${category.replace(/'/g, "''")}'`;
  }

  if (applySort && state.orderMode === 'sorted') {
    url += `&$orderby=fields/${CONFIG.sortColumn1} desc,fields/${CONFIG.sortColumn2} asc`;
  }

  const all = [];
  while (url) {
    const data = await graphGet(url);
    all.push(...(data.value || []));
    url = data['@odata.nextLink'] || null;
  }
  return all;
}

function parseImageUrl(raw) {
  if (!raw) return null;
  // Built-in Image column returns a JSON string
  try {
    const obj = typeof raw === 'string' ? JSON.parse(raw) : raw;
    if (obj.serverRelativeUrl) {
      const base = obj.serverUrl || new URL(CONFIG.siteUrl).origin;
      return base + obj.serverRelativeUrl;
    }
    if (obj.downloadUrl) return obj.downloadUrl;
    // Sometimes it's already a URL string inside a nested property
    if (obj.Url) return obj.Url;
  } catch {}
  // If it was already a plain URL string
  if (typeof raw === 'string' && raw.startsWith('http')) return raw;
  return null;
}

/* ── CATEGORIES ─────────────────────────────────────────────── */
async function loadCategories() {
  showLoading("Fetching categories…");
  try {
    const items = await fetchItems("__ALL__", false);
    const cats = [...new Set(
      items.map(i => i.fields?.[CONFIG.categoryColumn]).filter(Boolean)
    )].sort();

    const grid = $('cat-grid');
    // Keep the "All" button, add category chips
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-chip';
      btn.dataset.cat = cat;
      btn.textContent = cat;
      btn.addEventListener('click', () => selectCategory(cat));
      grid.appendChild(btn);
    });

    $('cat-status').textContent = cats.length
      ? `${cats.length} categor${cats.length===1?'y':'ies'} found`
      : "No categories found — showing all images";

    if (!cats.length) {
      // Skip category screen, go straight to slideshow
      await startSlideshow("__ALL__");
    }
  } catch(e) {
    $('cat-status').textContent = e.message;
    $('cat-status').classList.add('error');
  } finally {
    hideLoading();
  }
}

async function selectCategory(cat) {
  state.selectedCat = cat;
  await startSlideshow(cat);
}

/* ── SLIDESHOW ──────────────────────────────────────────────── */
async function startSlideshow(category) {
  showLoading("Loading images…");
  try {
    const items = await fetchItems(category);
    const slides = items
      .map(i => ({
        imageUrl: parseImageUrl(i.fields?.[CONFIG.imageColumn]),
        title:    i.fields?.[CONFIG.titleColumn] || '',
        category: i.fields?.[CONFIG.categoryColumn] || '',
        date:     i.fields?.[CONFIG.sortColumn1]   || '',
        slideNum: i.fields?.[CONFIG.sortColumn2]   || 0,
      }))
      .filter(s => s.imageUrl);

    // DEBUG — remove after confirming field names/formats
    console.log("Raw items sample:", items.slice(0, 3).map(i => i.fields));

    if (!slides.length) {
      toast("No images found for that category.", true);
      hideLoading();
      return;
    }

    if (state.orderMode === 'random') shuffleSlides(slides);

    state.slides = slides;
    state.currentIndex = 0;
    state.paused = false;

    hide('login'); hide('category');
    show('slide');
    hideLoading();

    renderSlide(0);
    scheduleNext();

    const label = category === "__ALL__" ? "All images" : category;
    $('hud-cat-badge').textContent = label;
  } catch(e) {
    const msg = (e.message || '').toLowerCase().includes('orderby')
      ? "Sort columns not found — check CONFIG"
      : "Error loading images: " + e.message;
    toast(msg, true);
    hideLoading();
  }
}

function renderSlide(idx) {
  const img = $('slide-img');
  const bg  = $('slide-bg');
  const s   = state.slides[idx];
  if (!s) return;

  img.classList.remove('visible');
  setTimeout(() => {
    img.src = s.imageUrl;
    bg.style.backgroundImage = `url('${s.imageUrl}')`;
    img.onload = () => img.classList.add('visible');
    img.onerror = () => { img.src = ''; goNext(); };
  }, 200);

  $('hud-title').textContent   = s.title;
  $('hud-counter').textContent = `${idx + 1} / ${state.slides.length}`;
}

function scheduleNext() {
  clearTimeout(state.timer);
  clearInterval(state.progressTimer);

  if (state.paused) return;

  // Animate progress bar
  const bar = $('progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    bar.style.transition = `width ${state.intervalSec}s linear`;
    bar.style.width = '100%';
  }));

  state.timer = setTimeout(goNext, state.intervalSec * 1000);
}

function goNext() {
  state.currentIndex = (state.currentIndex + 1) % state.slides.length;
  renderSlide(state.currentIndex);
  scheduleNext();
}
function goPrev() {
  state.currentIndex = (state.currentIndex - 1 + state.slides.length) % state.slides.length;
  renderSlide(state.currentIndex);
  scheduleNext();
}

/* ── HUD TOGGLE ─────────────────────────────────────────────── */
let hudTimer;
function toggleHud() {
  const hud = $('hud');
  if (hud.classList.contains('visible')) {
    hud.classList.remove('visible');
  } else {
    hud.classList.add('visible');
    clearTimeout(hudTimer);
    hudTimer = setTimeout(() => hud.classList.remove('visible'), 4000);
  }
}

/* ── PAUSE / RESUME ─────────────────────────────────────────── */
function togglePause() {
  state.paused = !state.paused;
  $('btn-pause').textContent = state.paused ? '▶' : '⏸';
  const bar = $('progress-bar');
  if (state.paused) {
    clearTimeout(state.timer);
    bar.style.transition = 'none';
  } else {
    scheduleNext();
  }
}

/* ── POPOVER EVENTS ──────────────────────────────────────────── */
$('popover-cancel').addEventListener('click', closeChipEditor);
$('popover-save').addEventListener('click', () => {
  if (_editIndex === null) return;
  const rawVal = parseInt($('popover-val').value, 10);
  const unit   = parseInt($('popover-unit').value, 10);
  if (!rawVal || rawVal < 1) return;
  presets[_editIndex] = Math.max(CONFIG.minIntervalSec, Math.min(CONFIG.maxIntervalSec, rawVal * unit));
  localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
  syncAllIntervalControls();
  closeChipEditor();
});
document.addEventListener('pointerdown', e => {
  if (_editIndex !== null && !$('chip-edit-popover').contains(e.target)) closeChipEditor();
});

/* ── RENDER INTERVAL CONTROLS ────────────────────────────────── */
renderIntervalControl($('login-interval-control'));
renderIntervalControl($('settings-interval-control'));

/* ── ORDER TOGGLE ────────────────────────────────────────────── */
$('order-toggle').addEventListener('click', e => {
  const btn = e.target.closest('.order-btn');
  if (!btn || btn.dataset.order === state.orderMode) return;
  setOrderMode(btn.dataset.order);
});
updateOrderToggleUI();

/* ── EVENT WIRING ────────────────────────────────────────────── */
// Login
$('btn-login').addEventListener('click', async () => {
  $('login-status').textContent = '';
  $('login-status').classList.remove('error');
  try {
    await msalInstance.loginRedirect({ scopes: SCOPES });
    hide('login'); show('category');
    await loadCategories();
  } catch(e) {
    $('login-status').textContent = e.message || "Sign-in failed";
    $('login-status').classList.add('error');
  }
});

// Category chips (dynamically added, handled in loadCategories)
$('cat-grid').querySelector('[data-cat="__ALL__"]')
  .addEventListener('click', () => selectCategory("__ALL__"));

// Slide screen tap → toggle HUD
$('screen-slide').addEventListener('click', e => {
  // Don't toggle if a HUD button was tapped
  if (e.target.closest('#hud')) return;
  toggleHud();
});

// HUD buttons
$('btn-prev').addEventListener('click', e => { e.stopPropagation(); goPrev(); });
$('btn-next').addEventListener('click', e => { e.stopPropagation(); goNext(); });
$('btn-pause').addEventListener('click', e => { e.stopPropagation(); togglePause(); });
$('btn-settings').addEventListener('click', e => {
  e.stopPropagation();
  $('settings-panel').classList.add('open');
});

// Settings panel
$('btn-settings-close').addEventListener('click', () => $('settings-panel').classList.remove('open'));
$('settings-panel').addEventListener('click', e => {
  if (e.target === $('settings-panel')) $('settings-panel').classList.remove('open');
});
$('btn-change-cat').addEventListener('click', () => {
  $('settings-panel').classList.remove('open');
  clearTimeout(state.timer);
  $('progress-bar').style.width = '0%';
  hide('slide'); show('category');
});
$('btn-refresh').addEventListener('click', async () => {
  $('settings-panel').classList.remove('open');
  await startSlideshow(state.selectedCat);
});
$('btn-logout').addEventListener('click', () => {
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length) msalInstance.logoutRedirect({ account: accounts[0] });
  hide('slide'); show('login');
  $('settings-panel').classList.remove('open');
  clearTimeout(state.timer);
});

/* ── HANDLE REDIRECT / SILENT SSO ───────────────────────────── */
(async () => {
  showLoading("Starting…");
  await msalInstance.initialize();
  try {
    await msalInstance.handleRedirectPromise();
  } catch {}

  const accounts = msalInstance.getAllAccounts();
  hideLoading();
  if (accounts.length) {
    // Already signed in from a previous session
    hide('login'); show('category');
    await loadCategories();
  } else {
    show('login');
  }
  syncAllIntervalControls();
})();
</script>
